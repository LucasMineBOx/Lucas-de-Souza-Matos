name: Build and deploy a container to an Azure Web App

env:
  AZURE_WEBAPP_NAME: 'applucas'
  REGISTRY_IMAGE: 'acr21-htgbfzbtdue4gxcw.azurecr.io/minha-app:latest'

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read
  # id-token: write # Descomente esta linha se estiver usando login por OIDC (sem segredos)

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Login no Azure
        uses: azure/login@v2 # Atualizado para a v2 (mais recente e segura)
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login no ACR
        run: az acr login --name acr21

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker
        run: |
          docker build -t ${{ env.REGISTRY_IMAGE }} .

      - name: Push Docker
        run: |
          docker push ${{ env.REGISTRY_IMAGE }}

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Login Azure
        uses: azure/login@v2 # Atualizado para a v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy no Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          images: ${{ env.REGISTRY_IMAGE }}
